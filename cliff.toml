# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration
# See documentation for more information on available options.

# yaml-language-server: $schema=https://www.schemastore.org/git-cliff.json

"$schema"   = "https://www.schemastore.org/git-cliff.json"
description = "Configuration file for git-cliff to generate changelogs based on conventional commits."
name        = "Repository Changelog Configuration"

# Optional: specify the version of the configuration format (not the project version)
version = "1.0.1"

[changelog]
    # A Tera template to be rendered as the changelog's header.
    # @see https://keats.github.io/tera/docs/#introduction
    header = """
<!-- markdownlint-disable -->
<!-- eslint-disable markdown/no-missing-label-refs -->
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
    # A Tera template to be rendered for each release in the changelog.
    body   = """
{% if version %}\
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## [Unreleased]
{% endif %}
{% if commit_range and commit_range.from and commit_range.to %}
  - <b>Commit Range: ➡️</b> \
  [`{{ commit_range.from | truncate(length=7, end="") }}...{{ commit_range.to | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ commit_range.from }}...{{ commit_range.to }} "View full commit range on GitHub")
{% endif %}
{% if bump_type == "major" %}
  > ⚠️ **Major release:** this version may contain breaking changes. Review upgrade notes carefully.
{% elif bump_type == "minor" %}
  > ✨ **Minor release:** this version adds backwards-compatible features and improvements.
{% elif bump_type == "patch" %}
  > 🩹 **Patch release:** this version focuses on fixes, maintenance, and smaller improvements.
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }} "📝 Diff: {{ commit.statistics.files_changed }} file{% if commit.statistics.files_changed != 1 %}s{% endif %}, ++{{ commit.statistics.additions }} | --{{ commit.statistics.deletions }}") — {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message
          | upper_first
          | replace(from="\n", to="\n    ")
          | replace(from=" - ", to="\n    - ")
      }}

  {% endfor %}
{% endfor %}\n
{% for submodule_path, commits in submodule_commits %}
    ### {{ submodule_path | upper_first }}
    {% for group, commits in commits | group_by(attribute="group") %}
        #### {{ group | upper_first }}
        {% for commit in commits %}
          - {{ commit.message | upper_first }}\
        {% endfor %}
    {% endfor %}
{% endfor %}\n
{% if commit.footer %}
  <!-- Use the footer directly -->
  {{ commit.footer | trim | indent(width=8) }}
{% endif %}
"""
    # A Tera template to be rendered as the changelog's footer.
    footer = """
## ⭐ Contributors
Thanks to all the [contributors](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/graphs/contributors) for their hard work!
## 📜 License
This project license is here: [Project License](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/blob/main/LICENSE)
*This changelog was automatically generated with [git-cliff](https://github.com/orhun/git-cliff).*
"""
    # Remove leading and trailing whitespaces from the changelog's body.
    trim   = true

    # An array of regex based postprocessors to modify the changelog.
    postprocessors           = [
        # { pattern = 'your-package-name', replace = "[your-package-name](https://github.com/${remote.github.owner}/${remote.github.repo})" }, # example repository URL replacement
        { pattern = "Merge branch", replace = "[chore] Merge Branch" },                                                                            # replace merge branch commit messages
        { pattern = '\[dependency\]', replace = "test" },
        { pattern = "merge branch", replace = "[chore] Merge Branch" },                                                                            # replace merge branch commit messages
        # Clean up Dependabot messages - remove verbose table content
        { pattern = 'Bump the.*?group with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependency group" },
        { pattern = 'Bumps the npm-all group.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update npm dependencies" },
        { pattern = '\[dependency\] \[chore\] Bump the.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependencies" },

        # Clean up individual package bump messages
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bumps \[([^\]]+)\].*?from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        # Generic bump message cleanup
        { pattern = "Bump", replace = "[dependency] Update" },
        # Remove git trailers that look noisy in rendered changelog entries
        { pattern = '\n\nSigned-off-by:.*', replace = "" },
    ]
    protect_breaking_commits = false
    render_always            = true
    # render body even when there are no releases to process
    # render_always = true
    # output file path
    # output = "test.md"

[git]
    # Parse commits according to the conventional commits specification.
    # @see https://www.conventionalcommits.org
    conventional_commits = true

    # Exclude commits that do not match the conventional commits specification.
    filter_unconventional = false

    # Split commits on newlines, treating each line as an individual commit.
    split_commits = false

    # Use for diverged branches if you want to changelog for each branch
    use_branch_tags = false

    # Recurse into submodules to find commits
    recurse_submodules = true

    # regex for parsing and grouping commits
    # Commit parsers support both raw Unicode Gitmojis and :shortcode: forms
    # from .github/agent-commit-message-instructions.md.
    #
    # commit_preprocessors = [
    #   # Replace issue numbers
    #   # This regex pattern matches issue references in the format "(optional text #123)"
    #   # and replaces them with a markdown link to the issue, e.g.,
    #   # "[#123](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/123)".
    #   { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/${2}))"},
    #   # Example: Check spelling of the commit with the `typos` tool.
    #   # For more information, visit: https://github.com/crate-ci/typos
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    #   # If the spelling is incorrect, it will be automatically fixed.
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    # ]

    # An array of regex based parsers for extracting data from the commit message.
    # Assigns commits to groups.
    # Optionally sets the commit's scope and can decide to exclude commits from further processing.
    commit_parsers = [
        # Skip noisy commit types
        { message = "^Merge branch", skip = true },
        { message = "^Merge pull request", skip = true },
        { message = "^merge branch", skip = true },
        { message = "^chore\\(pr\\)", skip = true },
        { message = "^chore\\(pull\\)", skip = true },
        { message = "^chore\\(release\\): prepare for", skip = true },

        # Security-related (keep separate from general dependencies)
        { message = "^(🔒️|🔒|🔐|🛂|:lock:|:closed_lock_with_key:|:passport_control:)", group = "<!-- 12 -->🛡️ Security" },
        { body = ".*security.*", group = "<!-- 12 -->🛡️ Security" },
        { message = ".*security.*", group = "<!-- 12 -->🛡️ Security" },

        # Dependency-related commits (emoji and bot/fallback patterns)
        { message = "^(⬆️|⬆|⬇️|⬇|📌|➕|➖|:arrow_up:|:arrow_down:|:pushpin:|:heavy_plus_sign:|:heavy_minus_sign:)", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^chore\\(deps.*\\)", group = "<!-- 11 -->📦 Dependencies" },
        { message = ".*dependabot.*", group = "<!-- 11 -->📦 Dependencies" },
        { message = ".*npm-all.*", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bump [a-zA-Z0-9@\\-\\/]+", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bump the.*group with \\d+ updates", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bumps \\[.*\\]", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^Bumps the.*group with \\d+ updates", group = "<!-- 11 -->📦 Dependencies" },
        { message = "^\\[dependency\\]", group = "<!-- 11 -->📦 Dependencies" },

        # Revert commits
        { message = "^(⏪️|⏪|:rewind:)", group = "<!-- 10 -->⏪ Reverts" },
        { message = "^revert", group = "<!-- 10 -->⏪ Reverts" },

        # Commit-type tags (accept any leading emoji/shortcode)
        { message = "^.*\\[feat\\]", group = "<!-- 0 -->✨ Features" },
        { message = "^.*\\[fix\\]", group = "<!-- 1 -->🛠️ Bug Fixes" },
        { message = "^.*\\[refactor\\]", group = "<!-- 2 -->🚜 Refactor" },
        { message = "^.*\\[docs\\]", group = "<!-- 3 -->📝 Documentation" },
        { message = "^.*\\[perf\\]", group = "<!-- 4 -->⚡ Performance" },
        { message = "^.*\\[style\\]", group = "<!-- 5 -->🎨 Styling" },
        { message = "^.*\\[test\\]", group = "<!-- 6 -->🧪 Testing" },
        { message = "^.*\\[chore\\]", group = "<!-- 7 -->🧹 Chores" },
        { message = "^.*\\[ci\\]", group = "<!-- 8 -->👷 CI/CD" },
        { message = "^.*\\[build\\]", group = "<!-- 9 -->🔧 Build System" },
        { message = "^.*\\[revert\\]", group = "<!-- 10 -->⏪ Reverts" },

        # Full Gitmoji mapping fallbacks (for commits without explicit [type])
        { message = "^(✨|🎉|🌱|🥚|🚩|👔|💥|:sparkles:|:tada:|:seedling:|:egg:|:triangular_flag_on_post:|:necktie:|:boom:)", group = "<!-- 0 -->✨ Features" },
        { message = "^(🐛|🚑️|🚑|🥅|🩹|:bug:|:ambulance:|:goal_net:|:adhesive_bandage:)", group = "<!-- 1 -->🛠️ Bug Fixes" },
        { message = "^(🚜|♻️|♻|🚚|🏗️|🏗|🧱|:tractor:|:recycle:|:truck:|:building_construction:|:bricks:)", group = "<!-- 2 -->🚜 Refactor" },
        { message = "^(📝|✏️|✏|💡|💬|📄|:memo:|:pencil2:|:bulb:|:speech_balloon:|:page_facing_up:)", group = "<!-- 3 -->📝 Documentation" },
        { message = "^(⚡️|⚡|🧵|:zap:|:thread:)", group = "<!-- 4 -->⚡ Performance" },
        { message = "^(🎨|💄|💫|📱|♿️|♿|:art:|:artist_palette:|:lipstick:|:dizzy:|:iphone:|:wheelchair:)", group = "<!-- 5 -->🎨 Styling" },
        { message = "^(🧪|✅|🤡|📸|🦺|:test_tube:|:white_check_mark:|:clown_face:|:camera_flash:|:safety_vest:)", group = "<!-- 6 -->🧪 Testing" },
        { message = "^(🧹|🔥|🚨|🙈|🗑️|🗑|⚰️|🔊|🔇|🍱|🍻|👽️|👽|🔀|💩|:broom:|:fire:|:rotating_light:|:see_no_evil:|:wastebasket:|:coffin:|:loud_sound:|:mute:|:bento:|:beers:|:alien:|:twisted_rightwards_arrows:|:poop:)", group = "<!-- 7 -->🧹 Chores" },
        { message = "^(👷|💚|🚧|🚀|🩺|:construction_worker:|:green_heart:|:construction:|:rocket:|:stethoscope:)", group = "<!-- 8 -->👷 CI/CD" },
        { message = "^(🔧|🔨|📦️|📦|:wrench:|:hammer:|:package:)", group = "<!-- 9 -->🔧 Build System" },

        # Remaining supported Gitmojis that are best treated as miscellaneous
        { message = "^(🔖|🌐|📈|🗃️|🗃|👥|🚸|⚗️|⚗|🔍️|🔍|🏷️|🏷|🧐|🧑‍💻|💸|✈️|✈|🦖|:bookmark:|:globe_with_meridians:|:chart_with_upwards_trend:|:card_file_box:|:busts_in_silhouette:|:children_crossing:|:alembic:|:mag:|:label:|:monocle_face:|:technologist:|:money_with_wings:|:airplane:|:t-rex:)", group = "<!-- 13 -->🛠️ Other Changes" },

        # Fallback patterns for conventional commits without emojis
        { message = "^build", group = "<!-- 9 -->🔧 Build System" },
        { message = "^ci", group = "<!-- 8 -->👷 CI/CD" },
        { message = "^docs?", group = "<!-- 3 -->📝 Documentation" },
        { message = "^feat", group = "<!-- 0 -->✨ Features" },
        { message = "^fix", group = "<!-- 1 -->🛠️ Bug Fixes" },
        { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
        { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
        { message = "^style", group = "<!-- 5 -->🎨 Styling" },
        { message = "^test", group = "<!-- 6 -->🧪 Testing" },
        { message = "^chore", group = "<!-- 7 -->🧹 Chores" },

        # CI/CD file changes
        { message = ".*\\.ya?ml", group = "<!-- 8 -->👷 CI/CD" },
        { message = ".*workflow.*", group = "<!-- 8 -->👷 CI/CD" },

        # Catch-all for miscellaneous changes
        { message = ".*", group = "<!-- 13 -->🛠️ Other Changes" },
    ]
    # Exclude commits that are not matched by any commit parser.
    filter_commits = false
    # Order releases topologically instead of chronologically.
    topo_order     = false
    # Order of commits in each group/release within the changelog.
    # Allowed values: newest, oldest
    sort_commits   = "newest"

[remote]
    # Keep remote metadata lookups disabled by default while still exposing
    # owner/repo values to the changelog template for reusable link generation.
    offline = true

    # GitHub repository metadata used by the changelog template.
    [remote.github]
        owner = "Nick2bad4u"
        repo  = "nick2bad4u-repo-template"
        # api_url = "https://api.github.com"
        # native_tls = false
